name: Convert handwriting OCR model (PyTorch → ONNX)

# Fully-automated PyTorch → ONNX conversion in GitHub Actions for TrOCR
# variants Xenova never published (e.g. trocr-large-handwritten). The
# converted ONNX is pushed to YOUR HuggingFace account so KobeOS can
# load it via @huggingface/transformers.
#
# Use this instead of mirror-handwriting-ocr.yml when:
#   - You want trocr-large-handwritten (no public ONNX exists)
#   - You want to own the conversion (no third-party ONNX in trust chain)
#
# Setup is identical to mirror-handwriting-ocr.yml — same HF_TOKEN
# repo secret powers both.

on:
  workflow_dispatch:
    inputs:
      destination_owner:
        description: 'Your HuggingFace username or organization'
        required: true
      source_pytorch_model:
        description: 'Source PyTorch model on HF (Microsoft original)'
        required: true
        default: 'microsoft/trocr-large-handwritten'
      destination_name:
        description: 'Name for the converted ONNX repo'
        required: true
        default: 'trocr-large-handwritten'

permissions:
  contents: read

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # Large model conversion + upload can take a while.
    steps:
      - uses: actions/checkout@v4

      - name: Refuse accidental token-as-username
        run: |
          if [[ "${{ inputs.destination_owner }}" =~ ^hf_ ]]; then
            echo "::error::First input must be your HF username, not a token."
            exit 1
          fi

      - name: Verify HF_TOKEN secret is set
        env:
          HAS_TOKEN: ${{ secrets.HF_TOKEN != '' }}
        run: |
          if [ "$HAS_TOKEN" != "true" ]; then
            echo "::error::HF_TOKEN secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install
          # optimum exporters pulls in torch + onnx; CPU-only is fine for
          # the export step (the model only runs forward once).
          python -m pip install -U \
            "optimum[exporters]" \
            "huggingface_hub[cli]" \
            "torch>=2.0" \
            transformers

      - name: Login to HuggingFace
        env:
          HF_TOKEN_VALUE: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface-cli login --token "$HF_TOKEN_VALUE" --add-to-git-credential

      - name: Run conversion script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd server
          chmod +x scripts/convert-handwriting-ocr-to-onnx.sh
          ./scripts/convert-handwriting-ocr-to-onnx.sh \
            "${{ inputs.destination_owner }}" \
            "${{ inputs.source_pytorch_model }}" \
            "${{ inputs.destination_name }}"

      - name: Summary
        run: |
          DEST="${{ inputs.destination_owner }}/${{ inputs.destination_name }}"
          echo "::notice::Converted + pushed: https://huggingface.co/${DEST}"
          echo ""
          echo "Now set in server/.env:"
          echo "  HANDWRITING_OCR_MODEL=${DEST}"
