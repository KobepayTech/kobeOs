name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    tags: ['v*']
    paths:
      - 'electron/**'
      - 'src/**'
      - 'server/**'
      - 'package.json'
      - 'package-lock.json'
      - 'server/package.json'
      - 'vite.config.*'
      - '.github/workflows/build-windows.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'electron/**'
      - 'src/**'
      - 'server/**'
      - 'package.json'
      - 'package-lock.json'
      - 'server/package.json'
      - 'vite.config.*'
      - '.github/workflows/build-windows.yml'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── Frontend ────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps
        # Note: npm install (not ci) because --legacy-peer-deps is needed for
        # @nestjs/swagger peer dependency conflicts with @nestjs/common versions.

      - name: Check Windows build scripts
        run: node scripts/check-windows-build-scripts.mjs

      - name: Build frontend with TypeScript check
        run: npm run build

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Install server dependencies
        run: npm install --legacy-peer-deps
        working-directory: server

      - name: Bundle NestJS backend
        run: npm run build:bundle

      # ── Pre-build steps ─────────────────────────────────────────────────────
      - name: Regenerate core integrity manifest
        run: npm run core:manifest

      - name: Verify manifest was generated
        run: |
          if (!(Test-Path "build/core-manifest.json")) {
            Write-Error "core-manifest.json was not generated"
            exit 1
          }
          $manifest = Get-Content "build/core-manifest.json" | ConvertFrom-Json
          $count = ($manifest.files | Get-Member -MemberType NoteProperty).Count
          Write-Host "Manifest contains $count files"
          if ($count -eq 0) {
            Write-Error "Manifest is empty"
            exit 1
          }
        shell: pwsh

      - name: Bundle Visual C++ runtime next to PostgreSQL binaries
        shell: pwsh
        run: |
          # The MSVC-built PostgreSQL binaries depend on the VC++ runtime. Without
          # it, initdb.exe fails to launch with 0xC0000135 (STATUS_DLL_NOT_FOUND).
          $binDir = "node_modules/@embedded-postgres/windows-x64/native/bin"
          if (!(Test-Path $binDir)) { Write-Error "Postgres bin dir not found: $binDir"; exit 1 }

          function Find-Dll($name) {
            $sys = Join-Path $env:WINDIR "System32\$name"
            if (Test-Path $sys) { return $sys }
            $redist = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\*\*\VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT\$name" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($redist) { return $redist.FullName }
            return $null
          }

          $required = @("vcruntime140.dll","vcruntime140_1.dll","msvcp140.dll")
          $optional = @("msvcp140_1.dll","msvcp140_2.dll","concrt140.dll","vccorlib140.dll")

          foreach ($d in $required) {
            $src = Find-Dll $d
            if (!$src) { Write-Error "Required runtime DLL not found on runner: $d"; exit 1 }
            Copy-Item $src -Destination $binDir -Force
            Write-Host "Bundled (required): $d  <- $src"
          }
          foreach ($d in $optional) {
            $src = Find-Dll $d
            if ($src) { Copy-Item $src -Destination $binDir -Force; Write-Host "Bundled (optional): $d" }
          }

      - name: Download Visual C++ 2015-2022 x64 Redistributable
        run: |
          $url = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          $dest = "build\vcredist\vc_redist.x64.exe"
          New-Item -ItemType Directory -Force -Path "build\vcredist" | Out-Null
          Write-Host "Downloading vc_redist.x64.exe from $url"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          $size = (Get-Item $dest).Length
          Write-Host "Downloaded: $([math]::Round($size/1MB, 1)) MB"
          if ($size -lt 5MB) {
            Write-Error "vc_redist.x64.exe is suspiciously small -- download may have failed"
            exit 1
          }
        shell: pwsh

      - name: Download cloudflared
        run: npm run download:cloudflared

      - name: Download Ollama (local AI runtime)
        run: npm run download:ollama
        continue-on-error: true

      # Bundle the offline AI models into the installer. Runs only when the
      # BUNDLE_AI_MODELS repo variable is 'true'. Sources (see
      # scripts/fetch-bundled-models.cjs): KOBE_MODELS_DIR for a self-hosted
      # runner with the GGUFs on local disk, or per-model `url` in
      # models/bundled/models.json for a GitHub-hosted runner. Fail-soft unless
      # KOBE_MODELS_REQUIRED=1.
      - name: Fetch bundled AI models
        if: vars.BUNDLE_AI_MODELS == 'true'
        run: npm run fetch:models
        continue-on-error: true
        env:
          KOBE_MODELS_DIR: ${{ vars.KOBE_MODELS_DIR }}
          KOBE_MODELS_AUTH: ${{ secrets.KOBE_MODELS_AUTH }}
          KOBE_MODELS_REQUIRED: ${{ vars.KOBE_MODELS_REQUIRED }}

      # ── Build installer ─────────────────────────────────────────────────────
      - name: Build Windows installer
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy vc_redist.x64.exe next to installer
        run: |
          Copy-Item "build\vcredist\vc_redist.x64.exe" "release\vc_redist.x64.exe" -Force
          Write-Host "Copied vc_redist.x64.exe to release\"
        shell: pwsh

      # ── Smoke tests ─────────────────────────────────────────────────────────
      - name: 'Smoke test: verify installer exists and is non-trivial'
        run: |
          $exes = Get-ChildItem release\*.exe -ErrorAction SilentlyContinue
          if ($exes.Count -eq 0) {
            Write-Error "No .exe found in release/"
            exit 1
          }
          foreach ($exe in $exes) {
            Write-Host "$($exe.Name): $([math]::Round($exe.Length/1MB, 1)) MB"
            if ($exe.Length -lt 10MB) {
              Write-Error "$($exe.Name) is suspiciously small (<10 MB)"
              exit 1
            }
          }
          Write-Host "Smoke test passed"
        shell: pwsh

      - name: 'Smoke test: verify vc_redist.x64.exe is bundled'
        run: |
          $redist = "release\vc_redist.x64.exe"
          if (!(Test-Path $redist)) {
            Write-Error "vc_redist.x64.exe not found in release\"
            exit 1
          }
          $size = (Get-Item $redist).Length
          Write-Host "vc_redist.x64.exe: $([math]::Round($size/1MB, 1)) MB"
          if ($size -lt 5MB) {
            Write-Error "vc_redist.x64.exe is too small -- may be corrupt"
            exit 1
          }
          Write-Host "VC++ redist bundled correctly"
        shell: pwsh

      - name: 'Smoke test: verify asar contains core files'
        run: |
          $asar = "release\win-unpacked\resources\app.asar"
          if (!(Test-Path $asar)) {
            Write-Error "app.asar not found at $asar"
            exit 1
          }
          npx asar list $asar | Select-String "electron/main.cjs","electron/preload.cjs","electron/update-manager.cjs"
          Write-Host "Core files present in asar"
        shell: pwsh

      - name: 'Smoke test: verify postgres binaries and VC++ runtime'
        run: |
          $unpackedRoot = "release\win-unpacked\resources\app.asar.unpacked\node_modules"
          $unpacked = "$unpackedRoot\@embedded-postgres\windows-x64"

          Write-Host "Contents of app.asar.unpacked\node_modules:"
          Get-ChildItem $unpackedRoot -ErrorAction SilentlyContinue | Select-Object Name

          if (!(Test-Path $unpacked)) {
            Write-Error "PostgreSQL platform package not found: $unpacked"
            exit 1
          }

          $initdb = Get-ChildItem "$unpacked" -Recurse -Filter "initdb.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (!$initdb) {
            Write-Error "initdb.exe not found inside $unpacked"
            exit 1
          }
          Write-Host "initdb.exe: $($initdb.FullName) ($([math]::Round($initdb.Length/1KB))KB)"

          if ($initdb.Length -lt 100KB) {
            Write-Error "initdb.exe is suspiciously small ($($initdb.Length) bytes) -- may be a stub"
            exit 1
          }

          # Verify VC++ runtime is bundled next to initdb.exe
          $initdbDir = Split-Path $initdb.FullName
          foreach ($dll in @("vcruntime140.dll","vcruntime140_1.dll","msvcp140.dll")) {
            if (!(Test-Path (Join-Path $initdbDir $dll))) {
              Write-Error "$dll not bundled next to initdb.exe -- startup would fail with 0xC0000135"
              exit 1
            }
          }
          Write-Host "VC++ runtime DLLs present next to initdb.exe"

          # Verify pg-bootstrap.cjs resolves
          npx asar list "release\win-unpacked\resources\app.asar" | Select-String "pg-bootstrap"
          Write-Host "Postgres smoke test passed"
        shell: pwsh

      # ── Artifacts ───────────────────────────────────────────────────────────
      - name: List release artifacts
        run: |
          Write-Host "=== Release Artifacts ==="
          Get-ChildItem release\ -Recurse | Select-Object FullName, @{N="SizeMB";E={[math]::Round($_.Length/1MB,1)}}
        shell: pwsh

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KobeOS-Windows-Setup
          path: |
            release/*.exe
            release/vc_redist.x64.exe
          retention-days: 30

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
