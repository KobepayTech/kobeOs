name: Build Windows Installer (self-hosted, offline AI)

# Builds the Windows installer ON YOUR OWN PC via a self-hosted GitHub Actions
# runner, so it can copy your local GGUF models straight off disk and bake them
# into the installer — no cloud, no upload, no URLs.
#
# Prerequisites (one-time):
#   1. Register your Windows PC as a self-hosted runner:
#        GitHub repo → Settings → Actions → Runners → New self-hosted runner
#        (choose Windows x64 and follow the shown commands). Give it the label
#        `windows` (default) so `runs-on: [self-hosted, windows]` matches.
#   2. Put your downloaded .gguf files in a folder, e.g. C:\KobeOS\Models, and
#      make the filenames match the `file` fields in models/bundled/models.json.
#   3. (Optional) repo Settings → Secrets and variables → Actions:
#        - Variable KOBE_MODELS_DIR to override the default C:\KobeOS\Models
#        - Secret   KOBE_MODELS_AUTH if any model uses a private download URL
#
# Then run it manually: Actions tab → this workflow → "Run workflow".
# (Kept manual on purpose so it doesn't double-build with the cloud workflow on
#  every push. To make it push-triggered instead, add an `on: push:` block and
#  disable Build Windows Installer for the branches you build here.)

on:
  workflow_dispatch:
    inputs:
      models_dir:
        description: 'Folder on this PC holding the .gguf files'
        required: false
        default: 'C:\KobeOS\Models'
      require_models:
        description: 'Fail the build if a listed model is missing'
        type: boolean
        required: false
        default: true

jobs:
  build-windows-selfhosted:
    runs-on: [self-hosted, windows]
    timeout-minutes: 120
    permissions:
      contents: write

    # Self-hosted Windows runners often have PowerShell execution policy set to
    # Restricted, which blocks the temp .ps1 wrapper GitHub uses for run: steps
    # ("running scripts is disabled on this system"). Invoke pwsh with
    # -ExecutionPolicy Bypass so every run: step works without changing the
    # machine's policy. (Alternatively, set the policy once on the runner:
    #   Set-ExecutionPolicy -Scope LocalMachine RemoteSigned )
    defaults:
      run:
        # Use Windows PowerShell 5.1 (`powershell`, always present) rather than
        # pwsh (PowerShell 7, not installed on this runner), with
        # -ExecutionPolicy Bypass to defeat a Restricted policy.
        shell: powershell -ExecutionPolicy Bypass -NoProfile -Command "& '{0}'"

    steps:
      # Self-hosted runners reuse the workspace between runs. A leftover process
      # from a previous run (or an app launched from release\win-unpacked to
      # test it) locks the build output, so the next checkout fails with
      # "EBUSY: resource busy or locked, rmdir ...release\win-unpacked". Stop any
      # lingering KobeOS/Electron/Ollama/cloudflared/node processes and clear the
      # release dir before checkout. Runs in the stale workspace; never fails.
      - name: Free workspace (stop lingering processes, clear locked build output)
        continue-on-error: true
        run: |
          # App processes are uniquely named — safe to stop broadly.
          foreach ($name in 'KobeOS','electron','ollama','cloudflared') {
            Get-Process -Name $name -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          }
          # Only stop node processes that belong to THIS workspace (the bundled
          # backend launched from win-unpacked), never unrelated node on the runner.
          Get-CimInstance Win32_Process -Filter "Name='node.exe'" -ErrorAction SilentlyContinue |
            Where-Object { $_.CommandLine -like "*$($env:GITHUB_WORKSPACE)*" -or $_.CommandLine -like '*win-unpacked*' } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue }
          Start-Sleep -Seconds 2
          $rel = Join-Path $env:GITHUB_WORKSPACE 'release'
          if (Test-Path $rel) {
            for ($i = 0; $i -lt 5; $i++) {
              try { Remove-Item -Recurse -Force $rel -ErrorAction Stop; break }
              catch { Write-Host "release still locked, retrying ($i)..."; Start-Sleep -Seconds 3 }
            }
          }

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── Frontend ────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Check Windows build scripts
        run: node scripts/check-windows-build-scripts.mjs

      - name: Build frontend with TypeScript check
        run: npm run build

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Install server dependencies
        run: npm install --legacy-peer-deps
        working-directory: server

      - name: Bundle NestJS backend
        run: npm run build:bundle

      # ── Pre-build steps ─────────────────────────────────────────────────────
      - name: Regenerate core integrity manifest
        run: npm run core:manifest

      - name: Verify manifest was generated
        run: |
          if (!(Test-Path "build/core-manifest.json")) {
            Write-Error "core-manifest.json was not generated"
            exit 1
          }
          $manifest = Get-Content "build/core-manifest.json" | ConvertFrom-Json
          $count = ($manifest.files | Get-Member -MemberType NoteProperty).Count
          Write-Host "Manifest contains $count files"
          if ($count -eq 0) {
            Write-Error "Manifest is empty"
            exit 1
          }

      - name: Bundle Visual C++ runtime next to PostgreSQL binaries
        run: |
          # The MSVC-built PostgreSQL binaries depend on the VC++ runtime. Without
          # it, initdb.exe fails to launch with 0xC0000135 (STATUS_DLL_NOT_FOUND).
          $binDir = "node_modules/@embedded-postgres/windows-x64/native/bin"
          if (!(Test-Path $binDir)) { Write-Error "Postgres bin dir not found: $binDir"; exit 1 }

          function Find-Dll($name) {
            $sys = Join-Path $env:WINDIR "System32\$name"
            if (Test-Path $sys) { return $sys }
            $redist = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\*\*\VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT\$name" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($redist) { return $redist.FullName }
            return $null
          }

          $required = @("vcruntime140.dll","vcruntime140_1.dll","msvcp140.dll")
          $optional = @("msvcp140_1.dll","msvcp140_2.dll","concrt140.dll","vccorlib140.dll")

          foreach ($d in $required) {
            $src = Find-Dll $d
            if (!$src) { Write-Error "Required runtime DLL not found on runner: $d"; exit 1 }
            Copy-Item $src -Destination $binDir -Force
            Write-Host "Bundled (required): $d  <- $src"
          }
          foreach ($d in $optional) {
            $src = Find-Dll $d
            if ($src) { Copy-Item $src -Destination $binDir -Force; Write-Host "Bundled (optional): $d" }
          }

      - name: Download Visual C++ 2015-2022 x64 Redistributable
        run: |
          $url = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          $dest = "build\vcredist\vc_redist.x64.exe"
          New-Item -ItemType Directory -Force -Path "build\vcredist" | Out-Null
          Write-Host "Downloading vc_redist.x64.exe from $url"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          $size = (Get-Item $dest).Length
          Write-Host "Downloaded: $([math]::Round($size/1MB, 1)) MB"
          if ($size -lt 5MB) {
            Write-Error "vc_redist.x64.exe is suspiciously small -- download may have failed"
            exit 1
          }

      - name: Download cloudflared
        run: npm run download:cloudflared

      # The AI is the whole point of this build, so a missing Ollama runtime is
      # a hard failure (OLLAMA_REQUIRED=1). GITHUB_TOKEN raises the API rate
      # limit so version resolution never silently fails on a busy runner.
      - name: Download Ollama (local AI runtime)
        run: npm run download:ollama
        env:
          OLLAMA_REQUIRED: '1'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # This is the whole point of the self-hosted build: copy YOUR local GGUFs
      # into models/bundled/ so electron-builder bakes them into the installer.
      - name: Bundle offline AI models from this PC
        run: npm run fetch:models
        env:
          KOBE_MODELS_DIR: ${{ github.event.inputs.models_dir || vars.KOBE_MODELS_DIR || 'C:\KobeOS\Models' }}
          KOBE_MODELS_AUTH: ${{ secrets.KOBE_MODELS_AUTH }}
          KOBE_MODELS_REQUIRED: ${{ github.event.inputs.require_models == 'false' && '0' || '1' }}

      # ── Build installer ─────────────────────────────────────────────────────
      - name: Build Windows installer
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy vc_redist.x64.exe next to installer
        run: |
          Copy-Item "build\vcredist\vc_redist.x64.exe" "release\vc_redist.x64.exe" -Force
          Write-Host "Copied vc_redist.x64.exe to release\"

      # ── Smoke tests ─────────────────────────────────────────────────────────
      - name: 'Smoke test: verify installer exists and is non-trivial'
        run: |
          $exes = Get-ChildItem release\*.exe -ErrorAction SilentlyContinue
          if ($exes.Count -eq 0) {
            Write-Error "No .exe found in release/"
            exit 1
          }
          foreach ($exe in $exes) {
            Write-Host "$($exe.Name): $([math]::Round($exe.Length/1MB, 1)) MB"
            if ($exe.Length -lt 10MB) {
              Write-Error "$($exe.Name) is suspiciously small (<10 MB)"
              exit 1
            }
          }
          Write-Host "Smoke test passed"

      - name: 'Smoke test: verify bundled AI models are present in the installer'
        run: |
          $models = "release\win-unpacked\resources\models"
          if (Test-Path $models) {
            $ggufs = @(Get-ChildItem "$models\*.gguf" -ErrorAction SilentlyContinue)
            Write-Host ("Bundled models in installer: " + $ggufs.Count)
            foreach ($g in $ggufs) {
              $mb = [math]::Round($g.Length / 1MB, 1)
              Write-Host ("  " + $g.Name + "  " + $mb + " MB")
            }
            if ($ggufs.Count -eq 0) {
              Write-Host "WARNING: no .gguf in resources/models; installer will rely on side-loaded models."
            }
          } else {
            Write-Host "WARNING: resources/models not found in the built app."
          }

      - name: 'Smoke test: verify Ollama runtime is bundled'
        run: |
          $ollama = "release\win-unpacked\resources\ollama\win-x64\ollama.exe"
          if (!(Test-Path $ollama)) {
            Write-Error "ollama.exe was NOT bundled at $ollama - the AI assistant would report 'cannot reach Ollama'. The download:ollama step must succeed."
            exit 1
          }
          $mb = [math]::Round((Get-Item $ollama).Length / 1MB, 1)
          Write-Host "Ollama runtime bundled: $ollama ($mb MB)"

      - name: 'Smoke test: verify asar contains core files'
        run: |
          $asar = "release\win-unpacked\resources\app.asar"
          if (!(Test-Path $asar)) {
            Write-Error "app.asar not found at $asar"
            exit 1
          }
          npx asar list $asar | Select-String "electron/main.cjs","electron/preload.cjs","electron/update-manager.cjs"
          Write-Host "Core files present in asar"

      # ── Artifacts ───────────────────────────────────────────────────────────
      - name: List release artifacts
        run: |
          Write-Host "=== Release Artifacts ==="
          Get-ChildItem release\ -Recurse | Select-Object FullName, @{N="SizeMB";E={[math]::Round($_.Length/1MB,1)}}

      # The runner IS your PC, so the fastest way to get the (multi-GB, offline-AI)
      # installer is a local copy — no slow/flaky upload to GitHub needed. Set the
      # KOBE_OUTPUT_DIR variable to change the destination (default: the user's
      # Desktop\KobeOS-Installers).
      - name: Copy installer to a local output folder
        run: |
          $out = if ($env:KOBE_OUTPUT_DIR) { $env:KOBE_OUTPUT_DIR } else { Join-Path ([Environment]::GetFolderPath('Desktop')) 'KobeOS-Installers' }
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item release\*.exe $out -Force
          if (Test-Path release\vc_redist.x64.exe) { Copy-Item release\vc_redist.x64.exe $out -Force }
          Write-Host "Installer copied to: $out"
          Get-ChildItem $out\*.exe | ForEach-Object { Write-Host ("  " + $_.Name + "  " + [math]::Round($_.Length/1MB,1) + " MB") }
        env:
          KOBE_OUTPUT_DIR: ${{ vars.KOBE_OUTPUT_DIR }}

      # Uploading a multi-GB artifact over a home connection often hits
      # ECONNRESET. It's optional here (the local copy above is the deliverable),
      # so never fail the build on a flaky upload.
      - name: Upload Windows installer artifact (best-effort)
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: KobeOS-Windows-Setup-offline-ai
          path: |
            release/*.exe
            release/vc_redist.x64.exe
          retention-days: 30
