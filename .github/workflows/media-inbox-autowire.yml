name: Wire Shared Media Inbox

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]

permissions:
  contents: write

jobs:
  wire:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wire media module and app registry
        shell: python
        run: |
          from pathlib import Path
          import re

          media = Path('server/src/media/media.module.ts')
          text = media.read_text()
          if "./media-inbox.entity" not in text:
              anchor = "import { MediaAsset } from './media.entity';"
              additions = "\n".join([
                  anchor,
                  "import { MediaInboxItem } from './media-inbox.entity';",
                  "import { MediaInboxService } from './media-inbox.service';",
                  "import { MediaInboxController } from './media-inbox.controller';",
                  "import { PosProduct } from '../pos/pos.entity';",
                  "import { AiModule } from '../ai/ai.module';",
              ])
              if anchor not in text:
                  raise SystemExit('MediaAsset import anchor not found')
              text = text.replace(anchor, additions)

          text = re.sub(
              r'TypeOrmModule\.forFeature\(\[\s*MediaAsset\s*\]\)',
              'TypeOrmModule.forFeature([MediaAsset, MediaInboxItem, PosProduct]),\n    AiModule',
              text,
          )
          text = re.sub(
              r'controllers:\s*\[([^\]]*\bMediaController\b[^\]]*)\]',
              lambda m: 'controllers: [' + (m.group(1) if 'MediaInboxController' in m.group(1) else m.group(1).rstrip() + ', MediaInboxController') + ']',
              text,
          )
          text = re.sub(
              r'providers:\s*\[([^\]]*\bMediaService\b[^\]]*)\]',
              lambda m: 'providers: [' + (m.group(1) if 'MediaInboxService' in m.group(1) else m.group(1).rstrip() + ', MediaInboxService') + ']',
              text,
          )
          text = re.sub(
              r'exports:\s*\[([^\]]*\bMediaService\b[^\]]*)\]',
              lambda m: 'exports: [' + (m.group(1) if 'MediaInboxService' in m.group(1) else m.group(1).rstrip() + ', MediaInboxService') + ']',
              text,
          )
          media.write_text(text)

          registry = Path('src/os/registry.ts')
          text = registry.read_text()
          if "@/apps/media-inbox/manifest" not in text:
              candidates = [
                  "import { manifest as erp_store_editor } from '@/apps/erp-store-editor/manifest';",
                  "import { manifest as kobe_studio } from '@/apps/kobe-studio/manifest';",
              ]
              for anchor in candidates:
                  if anchor in text:
                      text = text.replace(anchor, anchor + "\nimport { manifest as media_inbox } from '@/apps/media-inbox/manifest';")
                      break
              else:
                  raise SystemExit('Registry import anchor not found')

          if not re.search(r'\bmedia_inbox\s*,', text):
              anchors = ['erp_store_editor,', 'kobe_studio,']
              for anchor in anchors:
                  if anchor in text:
                      text = text.replace(anchor, anchor + '\n  media_inbox,', 1)
                      break
              else:
                  raise SystemExit('Registry catalogue anchor not found')
          registry.write_text(text)

          workflow = Path('.github/workflows/media-inbox-autowire.yml')
          workflow.unlink(missing_ok=True)

      - name: Commit branch wiring
        run: |
          git config user.name "KobeOS Automation"
          git config user.email "actions@kobepaytech.com"
          git add server/src/media/media.module.ts src/os/registry.ts .github/workflows/media-inbox-autowire.yml
          if git diff --cached --quiet; then
            echo "Nothing to wire"
            exit 0
          fi
          git commit -m "feat(media): wire shared media inbox into KobeOS"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
