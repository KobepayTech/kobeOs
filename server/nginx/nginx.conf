worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$host"';
  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 50m;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

  # Gzip
  gzip on;
  gzip_types text/plain application/json application/javascript text/css image/svg+xml;
  gzip_min_length 1000;

  # Common proxy headers
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
  server {
    listen 80 default_server;
    server_name kobeapptz.com www.kobeapptz.com *.kobeapptz.com api.kobeapptz.com _;

    # Keep health check usable on plain HTTP when a load balancer probes it.
    location = /health {
      proxy_pass http://api:3000;
      access_log off;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS API (api.kobeapptz.com) ──────────────────────────────────────────
  # Exact server_name takes priority over the wildcard/default SPA server below.
  server {
    listen 443 ssl http2;
    server_name api.kobeapptz.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header X-Kobe-Origin api always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Auth endpoints — stricter rate limit
    location ~ ^/api/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://api:3000;
    }

    # WebSocket (Socket.io)
    location /socket.io/ {
      proxy_pass http://api:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 86400;
    }

    # General API
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://api:3000;
      proxy_read_timeout 120s;
    }

    # Health check (no rate limit)
    location = /health {
      proxy_pass http://api:3000;
      access_log off;
    }
  }

  # ── HTTPS SPA — default origin for apex + www + every public subdomain ─────
  # This block is intentionally the default TLS server. If Cloudflare, a tenant
  # wildcard, or a browser sends any kobeapptz.com host to this IP, nginx should
  # serve KobeOS instead of falling through to a provider/parked default page.
  #
  # DNS: *.kobeapptz.com A/AAAA → this server's IP.
  # TLS: *.kobeapptz.com wildcard cert via Let's Encrypt DNS-01.
  #      Save as wildcard-fullchain.pem / wildcard-privkey.pem in
  #      server/nginx/certs/ (mounted at /etc/nginx/certs).
  server {
    listen 443 ssl http2 default_server;
    server_name kobeapptz.com www.kobeapptz.com *.kobeapptz.com _;

    ssl_certificate     /etc/nginx/certs/wildcard-fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/wildcard-privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header X-Kobe-Origin web-spa always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # The web container serves the Vite bundle on port 80 and handles SPA
    # deep-link fallback (/tuma, /mzigo/track/KM-TEST, /m/:slug, etc.).
    location / {
      proxy_pass http://web:80;
    }
  }
}
