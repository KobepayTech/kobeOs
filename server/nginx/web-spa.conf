# Internal SPA-serving nginx (runs inside the `web` container behind
# the TLS-terminating reverse-proxy nginx). Plain HTTP on :80 — the
# reverse proxy handles certs.
#
# Serves the same vite bundle for every Host header. The bundle's
# main.tsx routes by hostname + pathname, so tuma., mzigo., me.,
# posys., track. all hit the same files.

server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long-cache content-hashed assets (vite emits foo-AbCdE1.js).
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Service worker + manifest must NEVER stick in cache or PWA updates
  # never reach the user.
  location = /sw.js          { try_files $uri =404; add_header Cache-Control "no-cache"; }
  location = /manifest.json  { try_files $uri =404; add_header Cache-Control "no-cache"; }

  # SPA fallback — every other path serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
