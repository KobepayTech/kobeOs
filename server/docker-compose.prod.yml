version: '3.9'

# Production stack: NestJS API + PostgreSQL + Redis + Nginx reverse proxy
#
# Usage:
#   cp .env.example .env && nano .env   # fill in secrets
#   docker compose -f docker-compose.prod.yml up -d
#
# Secrets: set these in .env (never commit the file)
#   JWT_SECRET, DB_PASSWORD, REDIS_URL, etc.

services:
  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: kobepay/kobe-studio-api:latest
    container_name: kobe-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_SYNCHRONIZE: "false"
      DB_MIGRATIONS_RUN: "true"
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - kobe-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kobe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-kobe}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_DATABASE:-kobeos}
    volumes:
      - kobe-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-kobe} -d ${DB_DATABASE:-kobeos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kobe-net
    # Do NOT expose port 5432 externally in production
    expose:
      - "5432"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kobe-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - kobe-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - kobe-net
    expose:
      - "6379"

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: kobe-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - kobe-nginx-logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - kobe-net

volumes:
  kobe-pgdata:
  kobe-redis-data:
  kobe-nginx-logs:

networks:
  kobe-net:
    driver: bridge
