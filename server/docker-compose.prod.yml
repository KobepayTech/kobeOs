version: '3.9'

# Production stack: NestJS API + PostgreSQL + Redis + Nginx reverse proxy
#
# Usage:
#   cp .env.example .env && nano .env   # fill in secrets
#   docker compose -f docker-compose.prod.yml up -d
#
# Secrets: set these in .env (never commit the file)
#   JWT_SECRET, DB_PASSWORD, REDIS_URL, etc.

services:
  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: kobepay/kobe-studio-api:latest
    container_name: kobe-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_SYNCHRONIZE: "false"
      DB_MIGRATIONS_RUN: "true"
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - kobe-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kobe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-kobe}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_DATABASE:-kobeos}
    volumes:
      - kobe-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-kobe} -d ${DB_DATABASE:-kobeos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kobe-net
    # Do NOT expose port 5432 externally in production
    expose:
      - "5432"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kobe-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - kobe-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - kobe-net
    expose:
      - "6379"

  # ── SPA web container ─────────────────────────────────────────────────────────
  # Multi-stage build (Dockerfile.web at repo root) that runs vite to
  # produce dist/ then serves it via a minimal nginx on :80. The
  # reverse-proxy nginx below terminates TLS and forwards every non-API
  # host (kobeapptz.com + every subdomain) here.
  web:
    build:
      context: ..              # repo root — Dockerfile.web needs package.json, src/, etc.
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE: ${VITE_API_BASE:-https://api.kobeapptz.com/api}
        VITE_TENANT_BASE_DOMAIN: ${VITE_TENANT_BASE_DOMAIN:-kobeapptz.com}
    image: kobepay/kobe-web:latest
    container_name: kobe-web
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - kobe-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Cloudflare Tunnel ─────────────────────────────────────────────────────────
  # Connects OUTBOUND to Cloudflare's edge (no inbound ports) and forwards
  # *.kobeapptz.com traffic to nginx inside this network. The tunnel's
  # ingress config is managed remotely by the token — point it at
  # https://nginx:443 by running:
  #   KOBE_INGRESS_URL=https://nginx:443 KOBE_INGRESS_NO_TLS_VERIFY=1 \
  #     ./deploy/cf-setup.sh --apply
  #
  # `--protocol http2` forces TCP/443 instead of the default QUIC (UDP
  # 7844), which many host firewalls block — the usual cause of a tunnel
  # that installs fine but shows "0 active connections".
  #
  # Put the run token in server/.env as CLOUDFLARED_TOKEN (never commit it).
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kobe-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TOKEN:?CLOUDFLARED_TOKEN is required — from deploy/cf-setup.sh}
    depends_on:
      - nginx
    networks:
      - kobe-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx reverse proxy (TLS termination + routing) ───────────────────────────
  nginx:
    image: nginx:alpine
    container_name: kobe-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - kobe-nginx-logs:/var/log/nginx
    depends_on:
      - api
      - web
    networks:
      - kobe-net

volumes:
  kobe-pgdata:
  kobe-redis-data:
  kobe-nginx-logs:

networks:
  kobe-net:
    driver: bridge
